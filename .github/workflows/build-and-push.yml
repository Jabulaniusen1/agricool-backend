name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
      - development
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  BUILDKIT_PROGRESS: plain

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: gateway
            context: ./Gateway
            dockerfile: Dockerfile

          - image_name: base-api
            context: ./Base-API
            dockerfile: Dockerfile

          - image_name: impact-dashboard-backend
            context: ./Impact-Dashboard-Backend
            dockerfile: Dockerfile

          - image_name: impact-dashboard-backend-scheduler
            context: ./Impact-Dashboard-Backend
            dockerfile: Dockerfile.scheduler

          - image_name: app-impact-reporting
            context: ./App-Impact-Reporting
            dockerfile: Dockerfile

          - image_name: farmers-dashboard-backend
            context: ./Farmers-Dashboard-Backend
            dockerfile: Dockerfile

          - image_name: farmers-dashboard-backend-scheduler
            context: ./Farmers-Dashboard-Backend
            dockerfile: Dockerfile.scheduler

          - image_name: ml4-india
            context: ./ML4-India
            dockerfile: Dockerfile

          - image_name: ml4-nigeria
            context: ./ML4-Nigeria
            dockerfile: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Verify required ML artifacts exist
        run: |
          set -e
          git lfs ls-files

          test -f ML4-India/data/Master_encoded.csv
          test -f ML4-India/data/trained_model.pkl
          test -f ML4-Nigeria/data/Master_encoded.csv
          test -f ML4-Nigeria/data/models/model.pbz2

          echo "All required ML artifacts are present."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: image=moby/buildkit:latest

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY_IMAGE=${{ env.REGISTRY }}/${OWNER}
          echo "registry_image=${REGISTRY_IMAGE}" >> $GITHUB_OUTPUT

          IMAGE_TAG="${{ github.sha }}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          IMAGE="${REGISTRY_IMAGE}/${{ matrix.image_name }}:${IMAGE_TAG}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

          echo "Building image: ${IMAGE}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true

          tags: |
            ${{ steps.meta.outputs.image }}

          cache-from: type=registry,ref=${{ env.REGISTRY }}/${OWNER}/${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${OWNER}/${{ matrix.image_name }}:buildcache,mode=max

          provenance: false

          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Image digest
        run: |
          echo "Successfully pushed: ${{ steps.meta.outputs.image }}"
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Image name: ${{ matrix.image_name }}"
          echo "Dockerfile: ${{ matrix.dockerfile }}"
          echo "Build context: ${{ matrix.context }}"
